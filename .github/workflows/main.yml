name: Build Portable ARBrute (Enigma-Ready)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ARBrute.cpp'

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        update: true
        install: >
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-freerdp
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-zlib
          mingw-w64-x86_64-upx
          git

    - name: Compile ARBrute (Dynamic)
      run: |
        g++ ARBrute.cpp -o ARBrute.exe \
          -lws2_32 -lfreerdp3 -lfreerdp-client3 -lwinpr3 \
          -lssl -lcrypto -lwinmm \
          -O3 -std=c++17 -march=x86-64-v3 -mthreads -DNDEBUG \
          -I/mingw64/include/freerdp3 \
          -I/mingw64/include/winpr3 \
          -L/mingw64/lib

    - name: Copy ONLY Essential DLLs
      run: |
        cp /mingw64/bin/libfreerdp3.dll .
        cp /mingw64/bin/libfreerdp-client3.dll .
        cp /mingw64/bin/libwinpr3.dll .
        cp /mingw64/bin/libssl-3-x64.dll .
        cp /mingw64/bin/libcrypto-3-x64.dll .
        cp /mingw64/bin/libwinpthread-1.dll .
        cp /mingw64/bin/libstdc++-6.dll .
        cp /mingw64/bin/libgcc_s_seh-1.dll .
        cp /mingw64/bin/zlib1.dll .
        
        echo "DLL sizes:"
        du -h *.dll | sort -hr
        echo "Total DLL size: $(du -ch *.dll | tail -1 | cut -f1)"

    - name: Compress with UPX
      run: |
        upx --best ARBrute.exe
        for dll in *.dll; do upx --best "$dll" 2>/dev/null || true; done
        echo "After UPX:"
        du -h ARBrute.exe *.dll

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ARBrute-Portable
        path: |
          ARBrute.exe
          *.dll
        retention-days: 30
