name: Build Static ARBrute

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ARBrute.cpp'
      - '.github/workflows/build_static.yml'

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    
    strategy:
      matrix:
        include:
          - arch: x86_64
            env: mingw64
            bit: 64
            cpu: x86-64-v3

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.env }}
        update: true
        install: >
          mingw-w64-${{ matrix.arch }}-gcc
          mingw-w64-${{ matrix.arch }}-crt-git
          mingw-w64-${{ matrix.arch }}-cmake
          mingw-w64-${{ matrix.arch }}-ninja
          mingw-w64-${{ matrix.arch }}-openssl
          mingw-w64-${{ matrix.arch }}-zlib
          mingw-w64-${{ matrix.arch }}-upx
          git
          base-devel
          patch

    - name: Build FreeRDP (Static, Minimal)
      run: |
        set -e
        echo "🔧 Building FreeRDP statically..."
        
        # ✅ LATEST STABLE RELEASE (3.23.0)
        git clone --depth 1 --branch 3.23.0 https://github.com/FreeRDP/FreeRDP.git freerdp-src
        
        cd freerdp-src
        mkdir build && cd build
        
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=${MSYSTEM_PREFIX} \
          -DBUILD_SHARED_LIBS=OFF \
          -DSTATIC_CHANNELS=ON \
          -DWITH_SERVER=OFF \
          -DWITH_SERVER_INTERFACE=OFF \
          -DWITH_SAMPLE=OFF \
          -DWITH_CLIENT=OFF \
          -DWITH_CLIENT_INTERFACE=OFF \
          -DWITH_PROXY=OFF \
          -DWITH_PROXY_EMULATOR=OFF \
          -DWITH_FFMPEG=OFF \
          -DWITH_DSP_FFMPEG=OFF \
          -DWITH_VIDEO_FFMPEG=OFF \
          -DWITH_OPUS=OFF \
          -DWITH_GSM=OFF \
          -DWITH_LAME=OFF \
          -DWITH_FAAD2=OFF \
          -DWITH_FAAC=OFF \
          -DWITH_SOXR=OFF \
          -DWITH_OPENH264=OFF \
          -DWITH_ALSA=OFF \
          -DWITH_PULSE=OFF \
          -DWITH_OSS=OFF \
          -DWITH_JACK=OFF \
          -DWITH_CAIRO=OFF \
          -DWITH_SWSCALE=OFF \
          -DWITH_GFX_H264=OFF \
          -DWITH_GFX_AVC420=OFF \
          -DWITH_GFX_AVC444=OFF \
          -DWITH_REMOTEFX=OFF \
          -DWITH_PCSC=OFF \
          -DWITH_SMARTCARD=OFF \
          -DWITH_SMARTCARD_EMULATE=OFF \
          -DWITH_CUPS=OFF \
          -DWITH_LIBUSB=OFF \
          -DWITH_URIPARSER=OFF \
          -DWITH_X11=OFF \
          -DWITH_WAYLAND=OFF \
          -DWITH_VNC=OFF \
          -DWITH_CHANNELS=OFF \
          -DWITH_CLIENT_CHANNELS=OFF \
          -DWITH_SERVER_CHANNELS=OFF \
          -DWITH_OPENSSL=ON \
          -DWITH_ZLIB=ON \
          -DWITH_WINPR=ON \
          -DWITH_NATIVE_SSPI=ON \
          -DWITH_WINPR_TOOLS=OFF \
          -DWITH_MANPAGES=OFF \
          -DWITH_DEVELOPER=OFF \
          -DWITH_DEBUG_ALL=OFF \
          -DCMAKE_C_FLAGS="-Os -ffunction-sections -fdata-sections -flto -D_WIN32_WINNT=0x0601" \
          -DCMAKE_CXX_FLAGS="-Os -ffunction-sections -fdata-sections -flto -D_WIN32_WINNT=0x0601" \
          -DCMAKE_EXE_LINKER_FLAGS="-Wl,--gc-sections -s -flto" \
          ..
        
        ninja -j$(nproc)
        ninja install
        echo "✅ FreeRDP 3.23.0 built"

    - name: Compile ARBrute (Pure Static)
      run: |
        set -e
        cd $GITHUB_WORKSPACE
        
        g++ ARBrute.cpp -o ARBrute.exe \
          -I${MSYSTEM_PREFIX}/include/freerdp3 \
          -I${MSYSTEM_PREFIX}/include/winpr3 \
          -I${MSYSTEM_PREFIX}/include \
          -L${MSYSTEM_PREFIX}/lib \
          -lfreerdp3 -lfreerdp-client3 -lwinpr3 \
          -lssl -lcrypto -lz \
          -lws2_32 -lwinmm -lcrypt32 -lsecur32 -lbcrypt -liphlpapi \
          -lmpr -lwtsapi32 -lshlwapi \
          -static -static-libgcc -static-libstdc++ \
          -Os -std=c++17 -march=${{ matrix.cpu }} -mthreads -DNDEBUG \
          -ffunction-sections -fdata-sections -flto \
          -Wl,--gc-sections -Wl,-s -Wl,--strip-all
        
        echo "✅ Compiled: $(ls -lh ARBrute.exe)"

    - name: Optimize with UPX
      run: |
        set -e
        strip --strip-all ARBrute.exe 2>/dev/null || true
        if command -v upx &> /dev/null; then
          echo "📦 UPX compressing..."
          upx --best --ultra-brute ARBrute.exe
        fi
        echo "📊 Final size: $(du -h ARBrute.exe | cut -f1)"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ARBrute-Static-Windows-${{ matrix.bit }}bit
        path: ARBrute.exe
        retention-days: 30
