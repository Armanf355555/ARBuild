name: Ultimate Static Builder (32 & 64 Bit)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64
            env: mingw64
            bit: 64
            cpu: x86-64
            
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
        
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.env }}
        update: true
        install: mingw-w64-${{ matrix.arch }}-gcc mingw-w64-${{ matrix.arch }}-cmake mingw-w64-${{ matrix.arch }}-ninja mingw-w64-${{ matrix.arch }}-openssl mingw-w64-${{ matrix.arch }}-zlib git base-devel

    - name: Build FreeRDP STATICALLY
      run: |
        pacman -S --needed --noconfirm git
        git clone --depth 1 https://github.com/FreeRDP/FreeRDP.git
        cd FreeRDP
        mkdir build && cd build
        
        # قطع مطلقِ تمام وابستگی‌های لینوکسی، صوتی، تصویری و سخت‌افزاری
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DWITH_SERVER=OFF \
          -DWITH_SAMPLE=OFF \
          -DWITH_FFMPEG=OFF \
          -DWITH_DSP_FFMPEG=OFF \
          -DWITH_VIDEO_FFMPEG=OFF \
          -DWITH_OPUS=OFF \
          -DWITH_CAIRO=OFF \
          -DWITH_SWSCALE=OFF \
          -DWITH_ALSA=OFF \
          -DWITH_PULSE=OFF \
          -DWITH_OSS=OFF \
          -DWITH_CUPS=OFF \
          -DWITH_WAYLAND=OFF \
          -DWITH_X11=OFF \
          -DWITH_CHANNELS=OFF \
          -DWITH_CLIENT_CHANNELS=OFF \
          -DWITH_LIBUSB=OFF \
          -DWITH_PCSC=OFF \
          -DWITH_SMARTCARD=OFF \
          -DCMAKE_INSTALL_PREFIX=${MSYSTEM_PREFIX} \
          ..
          
        ninja install

    - name: Compile ARBrute
      run: |
        g++ ARBrute.cpp -o ARBrute_STATIC_${{ matrix.bit }}bit.exe \
        -I${MSYSTEM_PREFIX}/include/freerdp3 \
        -I${MSYSTEM_PREFIX}/include/winpr3 \
        -static \
        -L${MSYSTEM_PREFIX}/lib \
        -lfreerdp-client3 -lfreerdp3 -lwinpr3 \
        -lssl -lcrypto -lz \
        -lws2_32 -lwinmm -lcrypt32 -lsecur32 -lbcrypt -liphlpapi \
        -O3 -std=c++17 -march=${{ matrix.cpu }} -mtune=generic -mthreads

    - name: Upload Final Static EXE
      uses: actions/upload-artifact@v4
      with:
        name: ARBrute-Static-Windows
        path: ARBrute_STATIC_${{ matrix.bit }}bit.exe
