name: Build TRUE STATIC ARBrute

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    defaults:
      run:
        shell: msys2 {0}
        
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-zlib

    - name: Download & Build FreeRDP STATICALLY
      run: |
        git clone --depth 1 https://github.com/FreeRDP/FreeRDP.git
        cd FreeRDP
        mkdir build && cd build
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DWITH_SERVER=OFF \
          -DWITH_SAMPLE=OFF \
          -DWITH_FFMPEG=OFF \
          -DWITH_ALSA=OFF \
          -DWITH_PULSE=OFF \
          -DWITH_CUPS=OFF \
          -DWITH_WAYLAND=OFF \
          -DWITH_X11=OFF \
          -DCMAKE_INSTALL_PREFIX=/mingw64 \
          ..
        ninja install

    - name: Compile ARBrute (True Static)
      run: |
        g++ ARBrute.cpp -o ARBrute_STATIC.exe \
        -I/mingw64/include/freerdp3 -I/mingw64/include/winpr3 \
        -static \
        -L/mingw64/lib \
        -lfreerdp-client3 -lfreerdp3 -lwinpr3 \
        -lssl -lcrypto -lz \
        -lws2_32 -lwinmm -lcrypt32 -lsecur32 -lbcrypt -liphlpapi \
        -O3 -std=c++17 -march=native -mthreads

    - name: Upload Final Static EXE
      uses: actions/upload-artifact@v4
      with:
        name: ARBrute-True-Static
        path: ARBrute_STATIC.exe
